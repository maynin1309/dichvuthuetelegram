
    <!DOCTYPE html>
    <html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
        <meta http-equiv="Pragma" content="no-cache">
        <meta http-equiv="Expires" content="0">
        <title>Hệ thống Telegram</title>
        <style>
            html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
            #loading { color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; font-family: sans-serif; }
            #chat-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; z-index: 10; }
            .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: #3390EC; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
            @keyframes spin { 100% { transform: rotate(360deg); } }
        </style>
    </head>
    <body>
        <div id="loading">
            <div class="spinner"></div>
            <h3>Đang kết nối hệ thống...</h3>
        </div>
        <iframe id="chat-frame" allow="clipboard-read; clipboard-write; microphone; camera"></iframe>

        <script>
            const cfBaseUrl = "https://showing-conditions-cooling-end.trycloudflare.com/chat";
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const iframe = document.getElementById('chat-frame');
            const loading = document.getElementById('loading');
            
            if (token) {
                iframe.src = cfBaseUrl + "?token=" + token;
                iframe.onload = function() {
                    loading.style.display = 'none';
                    iframe.style.display = 'block';
                };
            } else {
                loading.innerHTML = "<h3 style='color:#ff595a;'>Lỗi: Không tìm thấy Token phiên làm việc!</h3>";
            }
        </script>
    </body>
    </html>
