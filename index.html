
    <!DOCTYPE html>
    <html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
        <title>Hệ thống Telegram</title>
        <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
        <style>
            body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif; margin: 0; }
            .container { text-align: center; padding: 20px; }
            .icon { font-size: 60px; margin-bottom: 15px; color: #3390EC; }
            @keyframes force-spin { 100% { transform: rotate(360deg); } }
            .ri-spin { animation: force-spin 1s linear infinite !important; display: inline-block; }
            .btn { margin-top: 20px; padding: 12px 24px; background: #3390EC; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
            p { color: #8E8E93; font-size: 14px; line-height: 1.5; }
        </style>
    </head>
    <body>
        <div class="container" id="loading">
            <div class="icon"><i class="ri-loader-4-line ri-spin"></i></div>
            <h3 style="margin-bottom: 10px;">Đang kết nối an toàn...</h3>
            <p>Vui lòng đợi trong giây lát</p>
        </div>
        <div class="container" id="error" style="display: none;">
            <div class="icon" style="color: #ff595a;"><i class="ri-server-line"></i></div>
            <h2 style="margin-bottom: 10px;">Hệ thống đang bảo trì</h2>
            <p>Máy chủ hiện đang nâng cấp hoặc mất mạng.<br>Vui lòng thử lại sau.</p>
            <button class="btn" onclick="checkServer()">Thử kết nối lại</button>
        </div>
        <script>
            const cfUrl = "https://emission-eric-windsor-stomach.trycloudflare.com";
            const queryString = window.location.search;
            const separator = queryString ? "&" : "?";
            const noCacheParam = "nocache=" + new Date().getTime();
            async function checkServer() {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000); 
                    const res = await fetch(cfUrl + "/ping_check", { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (res.ok) { window.location.replace(cfUrl + "/chat" + queryString + separator + noCacheParam); } 
                    else { throw new Error("Bad status"); }
                } catch (e) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').style.display = 'block';
                }
            }
            checkServer();
        </script>
    </body>
    </html>
