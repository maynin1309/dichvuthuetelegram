
    <!DOCTYPE html>
    <html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hệ thống Telegram</title>
        <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
        <style>
            body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif; margin: 0; }
            .container { text-align: center; padding: 20px; }
            .icon { font-size: 60px; margin-bottom: 15px; }
            @keyframes force-spin { 100% { transform: rotate(360deg); } }
            .ri-spin { animation: force-spin 1s linear infinite !important; display: inline-block; }
        </style>
    </head>
    <body>
        <div class="container" id="loading">
            <div class="icon"><i class="ri-loader-4-line ri-spin" style="color: #3390EC;"></i></div>
            <h3>Đang kết nối an toàn...</h3>
        </div>
        <script>
            const cfUrl = "https://keep-proprietary-cleaner-cms.trycloudflare.com";
            const queryString = window.location.search;
            const separator = queryString ? "&" : "?";
            const noCacheParam = "nocache=" + new Date().getTime();
            window.location.replace(cfUrl + "/chat" + queryString + separator + noCacheParam);
        </script>
    </body>
    </html>
